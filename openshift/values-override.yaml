# Environment-specific overrides for the lightspeed-agent Helm chart.
# Only values that differ from deploy/openshift/values.yaml belong here.

# Container image tags — the primary values updated per PR / release.
# Images are pulled directly from Quay.io by the OpenShift cluster.
agent:
  image:
    repository: quay.io/ecosystem-appeng/google-lightspeed-agent
    tag: on-pr-d229a4e07a8fc5682474025da91625ad9fe40cc1
  # Public URL where the agent Route is exposed on this cluster
  providerUrl: "https://lightspeed-agent-rh-lightspeed-agent.apps.ai5-devel.apps.eco-engineering.lab.eng.tlv2.redhat.com"

mcp:
  image:
    tag: latest

handler:
  image:
    repository: quay.io/ecosystem-appeng/google-marketplace-handler
    tag: on-pr-d229a4e07a8fc5682474025da91625ad9fe40cc1

standaloneUI:
  image:
    repository: quay.io/ltomasbo/lightspeed-agent-ui
    tag: latest

# Deployment mode:
#   hybrid     — Agent on OpenShift, marketplace handler stays on GCP (Cloud Run)
#   standalone — Everything on OpenShift (agent + handler + UI)
deploymentMode: standalone

google:
  useVertexAI: true

auth:
  skipDcrJwtValidation: true
  skipPubsubOidcVerification: true

# Secrets are managed externally (SealedSecrets, ExternalSecrets, or Vault),
# not by the chart.
secrets:
  create: false
  gcpServiceAccountKey: true
